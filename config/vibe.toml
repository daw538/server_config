active_model = "mistral-medium-3.5"
vim_keybindings = false
theme = "gruvbox"
disable_welcome_banner_animation = false
autocopy_to_clipboard = true
file_watcher_for_autocomplete = false
displayed_workdir = ""
context_warnings = false
voice_mode_enabled = false
narrator_enabled = false
active_transcribe_model = "voxtral-realtime"
active_tts_model = "voxtral-tts"
bypass_tool_permissions = false
enable_telemetry = true
system_prompt_id = "cli"
compaction_prompt_id = "compact"
include_commit_signature = true
include_model_info = true
include_project_context = true
include_prompt_detail = true
enable_update_checks = true
enable_notifications = true
enable_system_trust_store = false
api_timeout = 720.0
auto_compact_threshold = 200000
tool_paths = []
mcp_servers = []
enable_connectors = true

[experiment_overrides]

[[providers]]
name = "mistral"
api_base = "https://api.mistral.ai/v1"
api_key_env_var = "MISTRAL_API_KEY"
browser_auth_base_url = "https://console.mistral.ai"
browser_auth_api_base_url = "https://console.mistral.ai/api"
api_style = "openai"
backend = "mistral"
reasoning_field_name = "reasoning_content"
project_id = ""
region = ""

[providers.extra_headers]

[[models]]
name = "mistral-vibe-cli-latest"
provider = "mistral"
alias = "mistral-medium-3.5"
temperature = 1.0
input_price = 1.5
output_price = 7.5
thinking = "off"
supports_images = true
auto_compact_threshold = 200000

[project_context]
default_commit_count = 5
timeout_seconds = 2.0

[experiments]
enable = true

[session_logging]
save_dir = "~/.vibe/logs/session"
session_prefix = "session"
enabled = true

[tools.skill]
permission = "always"

[tools.edit]
permission = "always"
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]

[tools.web_fetch]
permission = "ask"
default_timeout = 30
max_timeout = 120
max_content_bytes = 120000

[tools.bash]
permission = "ask"
allowlist = [
    "basename",
    "cat",
    "cd",
    "chmod",
    "comm",
    "cut",
    "date",
    "diff",
    "dirname",
    "du",
    "echo",
    "file",
    "find",
    "fmt",
    "fold",
    "git -C",
    "git add",
    "git clone",
    "git commit",
    "git diff",
    "git log",
    "git remote -v",
    "git remote set-url",
    "git status",
    "grep",
    "head",
    "join",
    "less",
    "ls",
    "md5sum",
    "mkdir",
    "more",
    "nc",
    "nl",
    "od",
    "paste",
    "ps",
    "pwd",
    "readlink",
    "sed",
    "sha1sum",
    "sha256sum",
    "shasum",
    "sort",
    "ss",
    "ssh",
    "ssh-keygen",
    "stat",
    "sum",
    "tac",
    "tail",
    "test",
    "tput",
    "tr",
    "tree",
    "uname",
    "uniq",
    "vibe",
    "wc",
    "which",
    "whoami",
]
denylist = [
    "gdb",
    "pdb",
    "passwd",
    "nano",
    "vim",
    "vi",
    "emacs",
    "bash -i",
    "sh -i",
    "zsh -i",
    "fish -i",
    "dash -i",
    "screen",
    "tmux",
]
sensitive_patterns = [
    "sudo",
]
max_output_bytes = 16000
default_timeout = 300
denylist_standalone = [
    "python",
    "python3",
    "ipython",
    "bash",
    "sh",
    "nohup",
    "vi",
    "vim",
    "emacs",
    "nano",
    "su",
]

[tools.exit_plan_mode]
permission = "always"

[tools.read]
permission = "always"
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_read_bytes = 51200

[tools.ask_user_question]
permission = "always"

[tools.web_search]
permission = "ask"
timeout = 120

[tools.task]
permission = "ask"
allowlist = [
    "explore",
]

[tools.grep]
permission = "always"
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_output_bytes = 64000
default_max_matches = 100
default_timeout = 60
exclude_patterns = [
    ".venv/",
    "venv/",
    ".env/",
    "env/",
    "node_modules/",
    ".git/",
    "__pycache__/",
    ".pytest_cache/",
    ".mypy_cache/",
    ".tox/",
    ".nox/",
    ".coverage/",
    "htmlcov/",
    "dist/",
    "build/",
    ".idea/",
    ".vscode/",
    "*.egg-info",
    "*.pyc",
    "*.pyo",
    "*.pyd",
    ".DS_Store",
    "Thumbs.db",
]
codeignore_file = ".vibeignore"

[tools.write_file]
permission = "always"
sensitive_patterns = [
    "**/.env",
    "**/.env.*",
]
max_write_bytes = 64000
create_parent_dirs = true

[tools.todo]
permission = "always"
max_todos = 100